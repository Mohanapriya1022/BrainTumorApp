{% extends "base.html" %}
{% block content %}

<div class="container mt-4">
    <h2>Edit Profile</h2>

    <form method="POST" enctype="multipart/form-data">

        <!-- Age -->
        <div class="mb-3">
            <label>Age</label>
            <input type="number"
                   name="age"
                   value="{{ current_user.age }}"
                   class="form-control"
                   min="1"
                   max="120">
        </div>

        <!-- Gender -->
        <div class="mb-3">
            <label>Gender</label>
            <select name="gender" class="form-control">
                <option value="">Select Gender</option>
                <option value="Male"
                    {% if current_user.gender == "Male" %}selected{% endif %}>
                    Male
                </option>
                <option value="Female"
                    {% if current_user.gender == "Female" %}selected{% endif %}>
                    Female
                </option>
                <option value="Other"
                    {% if current_user.gender == "Other" %}selected{% endif %}>
                    Other
                </option>
            </select>
        </div>

        <!-- Phone -->
        <div class="mb-3">
            <label>Phone</label>
            <input type="text"
                   name="phone"
                   value="{{ current_user.phone }}"
                   class="form-control">
        </div>

        <!-- Place -->
        <div class="mb-3">
            <label>Place</label>
            <input type="text"
                   name="place"
                   value="{{ current_user.place }}"
                   class="form-control">
        </div>

        <!-- Profile Picture -->
        <div class="mb-3">
            <label>Profile Picture</label>
            <input type="file"
                   name="profile_image"
                   class="form-control">
        </div>

        <button type="submit" class="btn btn-success">
            Save Changes
        </button>

    </form>
</div>

{% endblock %}
