{% extends "base.html" %}

{% block content %}

<style>
:root {
    --med-navy: #1a2e44;
    --med-blue: #0056b3;
    --med-light: #f4f8fb;
    --med-text: #2c3e50;
}

/* Background */
body {
    background: radial-gradient(circle at bottom left, #f0f7ff 0%, #ffffff 100%);
    min-height: 100vh;
}

/* Card */
.login-card {
    border: none;
    border-radius: 20px;
    background: #ffffff;
    box-shadow: 0 15px 35px rgba(26, 46, 68, 0.1);
    border-top: 5px solid var(--med-blue);
    transition: 0.3s;
}

.login-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 45px rgba(26, 46, 68, 0.15);
}

/* Title */
.card-title {
    color: var(--med-navy);
    font-weight: 800;
}

/* Inputs */
.form-control {
    border: 2px solid #eef2f6;
    border-radius: 10px;
    padding: 12px;
    background-color: #fcfdfe;
}

.form-control:focus {
    border-color: var(--med-blue);
    box-shadow: 0 0 0 4px rgba(0,86,179,0.1);
}

/* Button */
.btn-login {
    background: var(--med-blue);
    border: none;
    padding: 14px;
    border-radius: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    transition: 0.3s;
}

.btn-login:hover {
    transform: translateY(-2px);
}

/* Role Buttons */
.role-select .btn {
    border-radius: 10px;
    font-weight: 600;
}

/* Lock badge */
.auth-badge {
    width: 60px;
    height: 60px;
    background: var(--med-light);
    color: var(--med-blue);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: -30px auto 20px;
}
</style>

<div class="container">
<div class="row justify-content-center align-items-center" style="min-height:80vh;">
<div class="col-md-5 col-lg-4">

<div class="card login-card mt-5">
<div class="card-body p-5">

<div class="auth-badge">
<i class="fas fa-lock fa-2x"></i>
</div>

<h2 class="text-center card-title mb-2">Welcome Back</h2>
<p class="text-center text-muted small mb-4">Neural Analysis Login Gateway</p>

<form method="POST" action="{{ url_for('auth.login') }}">

<!-- ROLE SELECTION -->

<div class="mb-4">
<label class="form-label fw-bold">Login As</label>

<div class="d-flex gap-3 role-select">

<input type="radio" class="btn-check" name="role" id="doctor" value="doctor" required>
<label class="btn btn-outline-primary w-50 py-2" for="doctor">
<i class="fas fa-user-md me-2"></i> Doctor
</label>

<input type="radio" class="btn-check" name="role" id="patient" value="patient">
<label class="btn btn-outline-success w-50 py-2" for="patient">
<i class="fas fa-user me-2"></i> Patient
</label>

</div>

<!-- Dynamic Role Info -->

<div id="roleInfo" class="text-center mt-3 small text-muted">
Please select your role to continue
</div>

</div>

<!-- EMAIL -->

<div class="mb-3">
<label class="form-label">Email Address</label>

<div class="input-group">
<span class="input-group-text">
<i class="fas fa-envelope"></i>
</span>

<input type="email"
id="emailField"
name="email"
class="form-control"
placeholder="Enter your email"
required>

</div>
</div>

<!-- PASSWORD -->

<div class="mb-4">
<label class="form-label">Password</label>

<div class="input-group">
<span class="input-group-text">
<i class="fas fa-key"></i>
</span>

<input type="password"
name="password"
class="form-control"
placeholder="••••••••"
required>

</div>
</div>

<div class="d-grid">
<button type="submit" class="btn btn-login btn-lg text-white">
Authorize Access <i class="fas fa-sign-in-alt ms-2"></i>
</button>
</div>

</form>

<div class="text-center mt-4">
<p class="text-muted small">
New to the portal?
<a href="{{ url_for('auth.signup') }}" class="text-primary fw-bold text-decoration-none">
Create Account
</a>
</p>
</div>

</div>
</div>

<div class="text-center mt-4 text-muted small">
<i class="fas fa-shield-alt me-1"></i> Authorized Personnel Only
</div>

</div>
</div>
</div>

<!-- JAVASCRIPT FOR ROLE CHANGE -->

<script>

const doctorBtn = document.getElementById("doctor");
const patientBtn = document.getElementById("patient");
const roleInfo = document.getElementById("roleInfo");
const emailField = document.getElementById("emailField");
const loginBtn = document.querySelector(".btn-login");

doctorBtn.addEventListener("change", function(){

roleInfo.innerHTML =
"Doctor Portal Access — Upload MRI scans and analyze tumor detection.";

roleInfo.style.color = "#0056b3";

emailField.placeholder = "doctor@hospital.com";

loginBtn.style.background = "#0056b3";

});

patientBtn.addEventListener("change", function(){

roleInfo.innerHTML =
"Patient Portal — View reports and brain scan diagnosis results.";

roleInfo.style.color = "#28a745";

emailField.placeholder = "patient@email.com";

loginBtn.style.background = "#28a745";

});

</script>

{% endblock %}
