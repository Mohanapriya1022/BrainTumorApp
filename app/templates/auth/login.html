{% extends "base.html" %}

{% block content %}
<style>
    :root {
        --med-navy: #1a2e44;
        --med-blue: #0056b3;
        --med-light: #f4f8fb;
        --med-text: #2c3e50;
    }

    /* Page background consistent with Signup/Home */
    body {
        background: radial-gradient(circle at bottom left, #f0f7ff 0%, #ffffff 100%);
        min-height: 100vh;
    }

    /* Form Card Styling */
    .login-card {
        border: none;
        border-radius: 20px;
        background: #ffffff;
        box-shadow: 0 15px 35px rgba(26, 46, 68, 0.1);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        border-top: 5px solid var(--med-blue);
    }

    .login-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 45px rgba(26, 46, 68, 0.15);
    }

    /* Typography */
    .card-title {
        color: var(--med-navy);
        font-weight: 800;
        letter-spacing: -0.5px;
    }

    .form-label {
        color: var(--med-navy);
        font-weight: 600;
        font-size: 0.9rem;
        margin-bottom: 8px;
    }

    /* Clean Input Fields */
    .form-control {
        border: 2px solid #eef2f6;
        border-radius: 10px;
        padding: 12px 15px;
        background-color: #fcfdfe;
        color: var(--med-text);
        transition: all 0.3s ease;
    }

    .form-control:focus {
        border-color: var(--med-blue);
        background-color: #fff;
        box-shadow: 0 0 0 4px rgba(0, 86, 179, 0.1);
        color: var(--med-navy);
    }

    /* Professional Button */
    .btn-login {
        background: var(--med-blue);
        border: none;
        padding: 14px;
        border-radius: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
    }

    .btn-login:hover {
        background: var(--med-navy);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 86, 179, 0.3);
    }

    /* Icon Accents */
    .input-group-text {
        background: transparent;
        border: 2px solid #eef2f6;
        border-right: none;
        color: var(--med-blue);
    }
    
    .form-control {
        border-left: 2px solid #eef2f6 !important;
    }

    /* Security/Lock Badge */
    .auth-badge {
        width: 60px;
        height: 60px;
        background: var(--med-light);
        color: var(--med-blue);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: -30px auto 20px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }
</style>

<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-md-5 col-lg-4">
            <div class="card login-card mt-5">
                <div class="card-body p-5">
                    <div class="auth-badge">
                        <i class="fas fa-lock fa-2x"></i>
                    </div>

                    <h2 class="text-center card-title mb-2">Welcome Back</h2>
                    <p class="text-center text-muted small mb-4">Neural Analysis Login Gateway</p>
                    
                    <form method="POST" action="{{ url_for('auth.login') }}">
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                <input type="email" name="email" class="form-control" placeholder="doctor@hospital.com" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-key"></i></span>
                                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-login btn-lg text-white">
                                Authorize Access <i class="fas fa-sign-in-alt ms-2"></i>
                            </button>
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        <p class="text-muted small">New to the portal? 
                            <a href="{{ url_for('auth.signup') }}" class="text-primary fw-bold text-decoration-none">Create Account</a>
                        </p>
                    </div>
                </div>
            </div>
            
            <div class="text-center mt-4 text-muted small">
                <i class="fas fa-shield-alt me-1"></i> Authorized Personnel Only
            </div>
        </div>
    </div>
</div>
{% endblock %}
