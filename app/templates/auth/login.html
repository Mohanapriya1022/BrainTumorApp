{% extends "base.html" %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    :root {
        --clinical-blue: #2563eb;
        --clinical-navy: #0f172a;
        --slate-50: #f8fafc;
        --slate-200: #e2e8f0;
        --slate-600: #475569;
        --doctor-blue: #0056b3;
        --patient-green: #28a745;
    }

    body {
        background-color: var(--slate-50);
        font-family: 'Plus Jakarta Sans', sans-serif;
        color: var(--clinical-navy);
        -webkit-font-smoothing: antialiased;
    }

    /* Stable Center Container */
    .auth-container {
        min-height: 90vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 0;
    }

    /* The "Clinical Card" */
    .login-card {
        background: #ffffff;
        border: 1px solid var(--slate-200);
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        width: 100%;
        max-width: 440px;
        overflow: hidden;
    }

    /* Section Headers */
    .card-header-custom {
        padding: 2.5rem 2.5rem 1rem;
        text-align: center;
        border-bottom: 1px solid var(--slate-50);
    }

    .card-header-custom h2 {
        font-weight: 700;
        font-size: 1.5rem;
        letter-spacing: -0.025em;
        margin-bottom: 0.5rem;
    }

    /* Form Elements */
    .card-body-custom {
        padding: 0 2.5rem 2.5rem;
    }

    .form-group-custom {
        margin-bottom: 1.25rem;
    }

    .label-custom {
        display: block;
        font-size: 0.813rem;
        font-weight: 600;
        color: var(--slate-600);
        margin-bottom: 0.5rem;
    }

    /* Input Styling */
    .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
    }

    .input-wrapper i {
        position: absolute;
        left: 1rem;
        color: var(--slate-600);
        font-size: 0.9rem;
    }

    .form-input {
        width: 100%;
        padding: 0.75rem 1rem 0.75rem 2.75rem;
        border: 1px solid var(--slate-200);
        border-radius: 8px;
        font-size: 0.938rem;
        transition: all 0.2s ease;
        background-color: #fff;
    }

    .form-input:focus {
        outline: none;
        border-color: var(--clinical-blue);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    /* Primary Button */
    .btn-clinical-primary {
        width: 100%;
        background-color: var(--clinical-blue);
        color: #ffffff;
        padding: 0.875rem;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 0.938rem;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 1rem;
    }

    /* Role Selection (Radio Buttons as Toggle) */
    .role-toggle-group {
        display: flex;
        gap: 10px;
        margin-bottom: 0.5rem;
    }

    .role-toggle-item {
        flex: 1;
    }

    .btn-check:checked + .btn-outline-primary {
        background-color: var(--doctor-blue);
        border-color: var(--doctor-blue);
        color: white;
    }

    .btn-check:checked + .btn-outline-success {
        background-color: var(--patient-green);
        border-color: var(--patient-green);
        color: white;
    }

    .footer-note {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.875rem;
        color: var(--slate-600);
    }

    .footer-link {
        color: var(--clinical-blue);
        text-decoration: none;
        font-weight: 600;
    }

    .footer-link:hover {
        text-decoration: underline;
    }

    .security-badge {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        font-size: 0.75rem;
        color: var(--slate-600);
        margin-top: 2rem;
        opacity: 0.8;
    }
</style>

<div class="auth-container">
    <div class="login-card">
        <div class="card-header-custom">
            <div style="background: var(--slate-50); width: 48px; height: 48px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
                <i class="fa-solid fa-shield-halved text-primary" style="font-size: 1.5rem;"></i>
            </div>
            <h2>Welcome Back</h2>
            <p style="color: var(--slate-600); font-size: 0.875rem;">Neural Analysis Login Gateway</p>
        </div>

        <div class="card-body-custom">
            <form method="POST" action="{{ url_for('auth.login') }}">
                
                <div class="form-group-custom">
                    <label class="label-custom">Identify Access Role</label>
                    <div class="role-toggle-group">
                        <div class="role-toggle-item">
                            <input type="radio" class="btn-check" name="role" id="doctor" value="doctor" required>
                            <label class="btn btn-outline-primary w-100 py-2 border-radius-8" for="doctor">
                                <i class="fas fa-user-md me-1"></i> Doctor
                            </label>
                        </div>
                        <div class="role-toggle-item">
                            <input type="radio" class="btn-check" name="role" id="patient" value="patient">
                            <label class="btn btn-outline-success w-100 py-2 border-radius-8" for="patient">
                                <i class="fas fa-user me-1"></i> Patient
                            </label>
                        </div>
                    </div>
                    <div id="roleInfo" class="text-center mt-2 small" style="font-size: 0.75rem; color: var(--slate-600);">
                        Select your role to initialize the portal.
                    </div>
                </div>

                <div class="form-group-custom">
                    <label class="label-custom">Institutional Email</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="emailField" name="email" class="form-input" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="form-group-custom">
                    <label class="label-custom">Security Key</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-key"></i>
                        <input type="password" name="password" class="form-input" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" id="loginBtn" class="btn-clinical-primary">
                    Authorize & Sign In
                </button>
            </form>

            <div class="footer-note">
                New to the portal? <a href="{{ url_for('auth.signup') }}" class="footer-link">Create Account</a>
            </div>

            <div class="security-badge">
                <i class="fa-solid fa-lock"></i>
                <span>Authorized Personnel Access Only</span>
            </div>
        </div>
    </div>
</div>

<script>
    const doctorBtn = document.getElementById("doctor");
    const patientBtn = document.getElementById("patient");
    const roleInfo = document.getElementById("roleInfo");
    const emailField = document.getElementById("emailField");
    const loginBtn = document.getElementById("loginBtn");

    doctorBtn.addEventListener("change", function(){
        roleInfo.innerHTML = "Doctor Portal Access — MRI analysis tools enabled.";
        roleInfo.style.color = "#0056b3";
        emailField.placeholder = "doctor@hospital.com";
        loginBtn.style.backgroundColor = "#0056b3";
    });

    patientBtn.addEventListener("change", function(){
        roleInfo.innerHTML = "Patient Portal — Viewing diagnosis reports.";
        roleInfo.style.color = "#28a745";
        emailField.placeholder = "patient@email.com";
        loginBtn.style.backgroundColor = "#28a745";
    });
</script>

{% endblock %}
